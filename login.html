<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="Images/carwashicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<title>Car Wash Management - Welcome</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', Arial, sans-serif;
  min-height: 100vh;
  color: #f1f5f9;
  overflow: hidden;
}

/* ===== Background ===== */
.cw-wrap {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #0f2744 50%, #0f1e36 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Poppins', sans-serif;
  padding: 2rem 1.5rem;
  position: relative;
  overflow: hidden;
}

.cw-orb1 {
  position: absolute;
  width: 480px; height: 480px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(34,211,238,0.18) 0%, transparent 70%);
  top: -120px; right: -100px;
  pointer-events: none;
}
.cw-orb2 {
  position: absolute;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(20,184,166,0.15) 0%, transparent 70%);
  bottom: -100px; left: -80px;
  pointer-events: none;
}

/* ===== Header ===== */
.cw-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: flex-end;
  padding: 20px 24px;
}

.cw-admin-btn {
  font-size: 13px;
  font-weight: 700;
  padding: 10px 18px;
  border-radius: 50px;
  border: 1px solid rgba(34,211,238,0.35);
  background: rgba(34,211,238,0.07);
  color: #a5f3fc;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all .2s;
  font-family: 'Poppins', sans-serif;
}
.cw-admin-btn:hover {
  background: rgba(34,211,238,0.18);
  border-color: rgba(34,211,238,0.6);
  color: #22d3ee;
  transform: translateY(-1px);
}

/* ===== Hero ===== */
.cw-hero {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cw-icon-ring {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(34,211,238,0.2), rgba(20,184,166,0.15));
  border: 1.5px solid rgba(34,211,238,0.3);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(34,211,238,0.15), inset 0 0 20px rgba(34,211,238,0.05);
}

.cw-icon-ring img {
  width: 58px;
  height: auto;
}

.cw-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 50px;
  background: rgba(34,211,238,0.1);
  border: 1px solid rgba(34,211,238,0.25);
  color: #67e8f9;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.cw-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22d3ee;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.cw-title {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(90deg, #e2e8f0 0%, #22d3ee 50%, #14b8a6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.15;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.cw-sub {
  font-size: 15px;
  color: #94a3b8;
  line-height: 1.7;
  margin-bottom: 36px;
  max-width: 420px;
}

/* ===== CTA Button ===== */
.cw-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%;
}

.cw-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 36px;
  border-radius: 50px;
  border: none;
  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.3px;
  cursor: pointer;
  color: #0f172a;
  background: linear-gradient(90deg, #22d3ee, #14b8a6);
  transition: transform .2s, filter .2s, box-shadow .2s;
  box-shadow: 0 8px 30px rgba(34,211,238,0.3);
}
.cw-cta:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
  box-shadow: 0 12px 40px rgba(34,211,238,0.4);
}
.cw-cta svg { width: 18px; height: 18px; }

.cw-hint {
  font-size: 12px;
  color: #475569;
}

/* ===== Stats ===== */
.cw-stats {
  display: flex;
  gap: 32px;
  margin-top: 44px;
  padding-top: 36px;
  border-top: 1px solid rgba(255,255,255,0.07);
  position: relative;
  z-index: 2;
}
.cw-stat { text-align: center; }
.cw-stat-num {
  font-size: 22px;
  font-weight: 900;
  color: #22d3ee;
  line-height: 1;
}
.cw-stat-lbl {
  font-size: 11px;
  color: #64748b;
  margin-top: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.cw-stat-sep {
  width: 1px;
  background: rgba(255,255,255,0.07);
}

/* ===== Admin Modal ===== */
.cw-modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 20;
  align-items: center;
  justify-content: center;
}
.cw-modal-bg.open { display: flex; }

.cw-modal {
  width: min(420px, 92vw);
  background: rgba(15,23,42,0.95);
  border: 1px solid rgba(34,211,238,0.2);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(34,211,238,0.05);
}

.cw-modal-top {
  padding: 20px 22px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; justify-content: space-between; align-items: center;
}
.cw-modal-ttl {
  font-size: 16px; font-weight: 800; color: #22d3ee;
}
.cw-modal-x {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: #94a3b8;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Poppins', sans-serif;
}
.cw-modal-x:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }

.cw-modal-body {
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
}
.cw-field label {
  display: block;
  font-size: 12px; font-weight: 700; color: #94a3b8;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 7px;
}
.cw-field input {
  width: 100%;
  padding: 13px 15px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: #e2e8f0;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s, background .2s;
}
.cw-field input:focus {
  border-color: rgba(34,211,238,0.4);
  background: rgba(34,211,238,0.04);
}
.cw-field input::placeholder { color: #475569; }

.cw-login-btn {
  width: 100%;
  padding: 13px;
  border-radius: 14px;
  border: none;
  font-family: 'Poppins', sans-serif;
  font-size: 15px; font-weight: 800;
  background: linear-gradient(90deg, #0e7490, #0f766e);
  color: #fff;
  cursor: pointer;
  transition: filter .2s, transform .2s;
}
.cw-login-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }

.cw-modal-foot {
  padding: 14px 22px;
  font-size: 11px; color: #475569; text-align: center;
  border-top: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<div class="cw-wrap">
  <div class="cw-orb1"></div>
  <div class="cw-orb2"></div>

  <!-- Header -->
  <div class="cw-header">
    <button class="cw-admin-btn" id="openAdmin">Admin Login</button>
  </div>

  <!-- Hero -->
  <div class="cw-hero">
    <div class="cw-badge">
      <div class="cw-badge-dot"></div>
      System Online
    </div>

    <div class="cw-icon-ring">
      <img src="Images/carwashicon.png" alt="Car Wash Logo">
    </div>

    <div class="cw-title">Car Wash<br>Management</div>
    <div class="cw-sub">
      Simple, modern parking and service management.
      Clients start instantly — admins control everything behind the scenes.
    </div>

    <div class="cw-actions">
      <button class="cw-cta" id="btnClient">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="8" stroke="#0f172a" stroke-width="1.5"/>
          <path d="M6 9h6M9 6l3 3-3 3" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Get Started
      </button>
      <div class="cw-hint">No registration required to begin</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="cw-stats">
    <div class="cw-stat">
      <div class="cw-stat-num">Fast</div>
      <div class="cw-stat-lbl">Check-in</div>
    </div>
    <div class="cw-stat-sep"></div>
    <div class="cw-stat">
      <div class="cw-stat-num">Live</div>
      <div class="cw-stat-lbl">Tracking</div>
    </div>
    <div class="cw-stat-sep"></div>
    <div class="cw-stat">
      <div class="cw-stat-num">Smart</div>
      <div class="cw-stat-lbl">Reports</div>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="cw-modal-bg" id="adminModal">
  <div class="cw-modal">
    <div class="cw-modal-top">
      <div class="cw-modal-ttl">Admin Login</div>
      <button class="cw-modal-x" id="closeAdmin">✕</button>
    </div>
    <div class="cw-modal-body">
      <div class="cw-field">
        <label>Username</label>
        <input id="adminUser" type="text" placeholder="Enter username">
      </div>
      <div class="cw-field">
        <label>Password</label>
        <input id="adminPass" type="password" placeholder="Enter password">
      </div>
      <button class="cw-login-btn" id="btnAdminLogin">Sign In</button>
    </div>
    <div class="cw-modal-foot">Secure admin access · Car Wash Management</div>
  </div>
</div>

<script>
  const adminModal = document.getElementById("adminModal");

  document.getElementById("openAdmin").addEventListener("click", () => {
    adminModal.classList.add("open");
  });

  document.getElementById("closeAdmin").addEventListener("click", () => {
    adminModal.classList.remove("open");
  });

  adminModal.addEventListener("click", e => {
    if (e.target === adminModal) adminModal.classList.remove("open");
  });

  document.getElementById("btnClient").addEventListener("click", () => {
    window.location.href = "client.php";
  });

  document.getElementById("btnAdminLogin").addEventListener("click", () => {
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;
    if (user === "admin" && pass === "admin123") {
      window.location.href = "admin.php";
    } else {
      alert("Invalid credentials (demo: admin / admin123)");
    }
  });
</script>

</body>
</html>
